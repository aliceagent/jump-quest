<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
  <title>Jump Quest</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      touch-action: manipulation;
      background: linear-gradient(180deg, #0a0a1a 0%, #1a1a3a 100%);
      font-family: 'Fredoka One', cursive;
    }
    #gameCanvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    #score {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 32px;
      color: #fff;
      text-shadow: 0 2px 10px rgba(0,0,0,0.5), 0 0 20px rgba(59,130,246,0.5);
      z-index: 10;
      pointer-events: none;
    }
    #gameOver {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.85);
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 20;
    }
    #gameOver h1 {
      font-size: 48px;
      color: #ff6b9d;
      margin-bottom: 20px;
      text-shadow: 0 0 20px rgba(255,107,157,0.5);
    }
    #gameOver .final-score {
      font-size: 28px;
      color: #fff;
      margin-bottom: 40px;
    }
    #restartBtn {
      padding: 20px 50px;
      font-size: 24px;
      font-family: 'Fredoka One', cursive;
      background: linear-gradient(135deg, #4ecdc4, #44a08d);
      border: none;
      border-radius: 50px;
      color: #fff;
      cursor: pointer;
      box-shadow: 0 5px 20px rgba(78,205,196,0.4);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    #restartBtn:active {
      transform: scale(0.95);
      box-shadow: 0 2px 10px rgba(78,205,196,0.3);
    }
    #startScreen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.85);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 25;
    }
    #startScreen h1 {
      font-size: 52px;
      color: #4ecdc4;
      margin-bottom: 10px;
      text-shadow: 0 0 30px rgba(78,205,196,0.6);
    }
    #startScreen .subtitle {
      font-size: 18px;
      color: #a0a0a0;
      margin-bottom: 40px;
    }
    #startScreen .instructions {
      color: #fff;
      font-size: 16px;
      text-align: center;
      line-height: 1.8;
      margin-bottom: 40px;
      padding: 0 20px;
    }
    #startScreen .instructions span {
      color: #ffe66d;
    }
    #startBtn {
      padding: 20px 60px;
      font-size: 26px;
      font-family: 'Fredoka One', cursive;
      background: linear-gradient(135deg, #ff6b9d, #ff8a80);
      border: none;
      border-radius: 50px;
      color: #fff;
      cursor: pointer;
      box-shadow: 0 5px 25px rgba(255,107,157,0.5);
      transition: transform 0.2s;
    }
    #startBtn:active {
      transform: scale(0.95);
    }
  </style>
</head>
<body>
  <div id="score">0</div>
  <canvas id="gameCanvas"></canvas>
  
  <div id="startScreen">
    <h1>🚀 Jump Quest</h1>
    <div class="subtitle">Endless Platform Climber</div>
    <div class="instructions">
      Tap <span>LEFT</span> side → Jump left<br>
      Tap <span>RIGHT</span> side → Jump right<br>
      Don't fall!
    </div>
    <button id="startBtn">PLAY</button>
  </div>
  
  <div id="gameOver">
    <h1>Game Over!</h1>
    <div class="final-score">Score: <span id="finalScore">0</span></div>
    <button id="restartBtn">Play Again</button>
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const gameOverEl = document.getElementById('gameOver');
    const finalScoreEl = document.getElementById('finalScore');
    const restartBtn = document.getElementById('restartBtn');
    const startScreen = document.getElementById('startScreen');
    const startBtn = document.getElementById('startBtn');

    let W, H;
    let gameRunning = false;
    let score = 0;
    let stars = [];
    let platforms = [];
    let player = null;
    let basePlatformSpeed = 1.5;

    const platformColors = ['#ff6b9d', '#4ecdc4', '#ffe66d', '#a855f7', '#f97316', '#06b6d4'];

    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    // Generate stars
    function initStars() {
      stars = [];
      for (let i = 0; i < 80; i++) {
        stars.push({
          x: Math.random() * W,
          y: Math.random() * H,
          size: Math.random() * 2 + 0.5,
          twinkle: Math.random() * Math.PI * 2,
          speed: Math.random() * 0.02 + 0.01
        });
      }
    }

    // Player class
    class Player {
      constructor() {
        this.x = W / 2;
        this.y = H - 150;
        this.radius = 20;
        this.vx = 0;
        this.vy = 0;
        this.onGround = false;
        this.squash = 1;
        this.stretch = 1;
        this.eyeOffset = 0;
      }

      update() {
        // Gravity
        this.vy += 0.5;
        
        // Apply velocity
        this.x += this.vx;
        this.y += this.vy;
        
        // Friction
        this.vx *= 0.92;
        
        // Wall bounce
        if (this.x < this.radius) {
          this.x = this.radius;
          this.vx *= -0.5;
        }
        if (this.x > W - this.radius) {
          this.x = W - this.radius;
          this.vx *= -0.5;
        }
        
        // Squash/stretch recovery
        this.squash += (1 - this.squash) * 0.2;
        this.stretch += (1 - this.stretch) * 0.2;
        
        // Eye follow velocity
        this.eyeOffset = this.vx * 0.3;
      }

      jump(direction) {
        if (this.onGround) {
          this.vy = -14;
          this.vx = direction * 8;
          this.squash = 1.3;
          this.stretch = 0.7;
          this.onGround = false;
        }
      }

      draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.scale(this.squash, this.stretch);
        
        // Body (circle)
        const gradient = ctx.createRadialGradient(0, -5, 0, 0, 0, this.radius);
        gradient.addColorStop(0, '#60a5fa');
        gradient.addColorStop(1, '#3b82f6');
        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
        ctx.fill();
        
        // Body outline
        ctx.strokeStyle = '#1d4ed8';
        ctx.lineWidth = 2;
        ctx.stroke();
        
        // Antenna
        ctx.strokeStyle = '#9ca3af';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(0, -this.radius);
        ctx.lineTo(0, -this.radius - 10);
        ctx.stroke();
        
        // Antenna ball
        ctx.fillStyle = '#f97316';
        ctx.beginPath();
        ctx.arc(0, -this.radius - 12, 4, 0, Math.PI * 2);
        ctx.fill();
        
        // Eyes
        const eyeY = -3;
        const eyeSpacing = 7;
        
        // Left eye white
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.ellipse(-eyeSpacing + this.eyeOffset, eyeY, 6, 7, 0, 0, Math.PI * 2);
        ctx.fill();
        
        // Right eye white
        ctx.beginPath();
        ctx.ellipse(eyeSpacing + this.eyeOffset, eyeY, 6, 7, 0, 0, Math.PI * 2);
        ctx.fill();
        
        // Left pupil
        ctx.fillStyle = '#1e293b';
        ctx.beginPath();
        ctx.arc(-eyeSpacing + this.eyeOffset * 1.5, eyeY + 1, 3, 0, Math.PI * 2);
        ctx.fill();
        
        // Right pupil
        ctx.beginPath();
        ctx.arc(eyeSpacing + this.eyeOffset * 1.5, eyeY + 1, 3, 0, Math.PI * 2);
        ctx.fill();
        
        // Eye shine
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(-eyeSpacing + this.eyeOffset * 1.5 - 1, eyeY - 1, 1.5, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(eyeSpacing + this.eyeOffset * 1.5 - 1, eyeY - 1, 1.5, 0, Math.PI * 2);
        ctx.fill();
        
        // Mouth
        ctx.strokeStyle = '#1d4ed8';
        ctx.lineWidth = 2;
        ctx.beginPath();
        if (this.onGround) {
          ctx.arc(0, 6, 5, 0, Math.PI);
        } else {
          ctx.arc(0, 8, 3, 0, Math.PI);
        }
        ctx.stroke();
        
        // Feet
        ctx.fillStyle = '#3b82f6';
        ctx.beginPath();
        ctx.ellipse(-8, this.radius - 3, 6, 4, -0.3, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(8, this.radius - 3, 6, 4, 0.3, 0, Math.PI * 2);
        ctx.fill();
        
        ctx.restore();
      }
    }

    // Platform class
    class Platform {
      constructor(x, y, width) {
        this.x = x;
        this.y = y;
        this.width = width;
        this.height = 15;
        this.color = platformColors[Math.floor(Math.random() * platformColors.length)];
        this.bobOffset = Math.random() * Math.PI * 2;
        this.landed = false;
      }

      update(speed) {
        this.y += speed;
      }

      draw() {
        const bobY = Math.sin(Date.now() * 0.003 + this.bobOffset) * 2;
        
        ctx.save();
        ctx.translate(this.x, this.y + bobY);
        
        // Platform shadow
        ctx.fillStyle = 'rgba(0,0,0,0.2)';
        ctx.beginPath();
        ctx.roundRect(-this.width/2 + 3, 3, this.width, this.height, 8);
        ctx.fill();
        
        // Platform gradient
        const gradient = ctx.createLinearGradient(0, 0, 0, this.height);
        gradient.addColorStop(0, this.color);
        gradient.addColorStop(1, this.adjustColor(this.color, -30));
        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.roundRect(-this.width/2, 0, this.width, this.height, 8);
        ctx.fill();
        
        // Highlight
        ctx.fillStyle = 'rgba(255,255,255,0.3)';
        ctx.beginPath();
        ctx.roundRect(-this.width/2 + 4, 2, this.width - 8, 4, 4);
        ctx.fill();
        
        ctx.restore();
      }

      adjustColor(hex, amount) {
        const num = parseInt(hex.slice(1), 16);
        const r = Math.min(255, Math.max(0, (num >> 16) + amount));
        const g = Math.min(255, Math.max(0, ((num >> 8) & 0x00FF) + amount));
        const b = Math.min(255, Math.max(0, (num & 0x0000FF) + amount));
        return `#${(1 << 24 | r << 16 | g << 8 | b).toString(16).slice(1)}`;
      }
    }

    function initPlatforms() {
      platforms = [];
      // Starting platform
      platforms.push(new Platform(W/2, H - 80, 120));
      
      // Generate initial platforms
      let lastY = H - 80;
      for (let i = 0; i < 8; i++) {
        lastY -= 90 + Math.random() * 40;
        const width = 80 + Math.random() * 40;
        const x = width/2 + Math.random() * (W - width);
        platforms.push(new Platform(x, lastY, width));
      }
    }

    function resetGame() {
      score = 0;
      scoreEl.textContent = '0';
      player = new Player();
      initPlatforms();
      initStars();
      gameOverEl.style.display = 'none';
      gameRunning = true;
    }

    function gameOver() {
      gameRunning = false;
      finalScoreEl.textContent = score;
      gameOverEl.style.display = 'flex';
    }

    function drawStars() {
      stars.forEach(star => {
        star.twinkle += star.speed;
        const alpha = 0.4 + Math.sin(star.twinkle) * 0.4;
        ctx.fillStyle = `rgba(255,255,255,${alpha})`;
        ctx.beginPath();
        ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
        ctx.fill();
      });
    }

    function checkCollisions() {
      player.onGround = false;
      
      for (let platform of platforms) {
        // Only check collision if falling
        if (player.vy > 0) {
          const playerBottom = player.y + player.radius;
          const playerTop = player.y - player.radius;
          const prevBottom = playerBottom - player.vy;
          
          if (prevBottom <= platform.y && playerBottom >= platform.y) {
            // Check horizontal overlap
            const platformLeft = platform.x - platform.width/2;
            const platformRight = platform.x + platform.width/2;
            
            if (player.x + player.radius * 0.5 > platformLeft && 
                player.x - player.radius * 0.5 < platformRight) {
              player.y = platform.y - player.radius;
              player.vy = 0;
              player.vx *= 0.5;
              player.squash = 0.8;
              player.stretch = 1.2;
              player.onGround = true;
              
              // Score for new platform
              if (!platform.landed) {
                platform.landed = true;
                score++;
                scoreEl.textContent = score;
                scoreEl.style.transform = 'translateX(-50%) scale(1.3)';
                setTimeout(() => {
                  scoreEl.style.transform = 'translateX(-50%) scale(1)';
                }, 100);
              }
            }
          }
        }
      }
    }

    function update() {
      if (!gameRunning) return;
      
      const speed = basePlatformSpeed + score * 0.05;
      
      player.update();
      
      // Update platforms
      platforms.forEach(p => p.update(speed));
      
      // Recycle platforms
      platforms = platforms.filter(p => p.y < H + 50);
      
      // Add new platforms
      const highestPlatform = platforms.reduce((min, p) => p.y < min ? p.y : min, H);
      if (highestPlatform > 80) {
        const width = 80 + Math.random() * 40;
        const x = width/2 + Math.random() * (W - width);
        platforms.push(new Platform(x, highestPlatform - 90 - Math.random() * 40, width));
      }
      
      checkCollisions();
      
      // Check game over
      if (player.y > H + 50) {
        gameOver();
      }
    }

    function draw() {
      // Clear with gradient
      const gradient = ctx.createLinearGradient(0, 0, 0, H);
      gradient.addColorStop(0, '#0a0a1a');
      gradient.addColorStop(1, '#1a1a3a');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, W, H);
      
      drawStars();
      
      platforms.forEach(p => p.draw());
      
      if (player) {
        player.draw();
      }
    }

    function gameLoop() {
      update();
      draw();
      requestAnimationFrame(gameLoop);
    }

    // Touch/click handling
    function handleTap(x) {
      if (!gameRunning) return;
      
      if (x < W / 2) {
        player.jump(-1); // Jump left
      } else {
        player.jump(1); // Jump right
      }
    }

    canvas.addEventListener('touchstart', (e) => {
      e.preventDefault();
      const touch = e.touches[0];
      handleTap(touch.clientX);
    }, { passive: false });

    canvas.addEventListener('mousedown', (e) => {
      handleTap(e.clientX);
    });

    // Button handlers
    startBtn.addEventListener('click', () => {
      startScreen.style.display = 'none';
      resetGame();
    });

    restartBtn.addEventListener('click', () => {
      resetGame();
    });

    // Also restart on canvas tap when game over
    gameOverEl.addEventListener('click', (e) => {
      if (e.target === gameOverEl) {
        resetGame();
      }
    });

    // Prevent zoom on double tap
    document.addEventListener('dblclick', (e) => {
      e.preventDefault();
    });

    // Initialize
    initStars();
    player = new Player();
    initPlatforms();
    gameLoop();
  </script>
</body>
</html>
