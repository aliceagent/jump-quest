<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
  <title>Jump Quest</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      touch-action: manipulation;
      background: linear-gradient(180deg, #0a0a1a 0%, #1a1a3a 100%);
      font-family: 'Fredoka One', cursive;
    }
    #gameCanvas {
      display: block;
      width: 100%;
      height: calc(100% - 100px);
    }
    #controls {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 100px;
      display: flex;
      justify-content: space-between;
      padding: 10px 15px;
      background: linear-gradient(180deg, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.6) 100%);
    }
    .btn-group {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .control-btn {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: none;
      font-family: 'Fredoka One', cursive;
      font-size: 18px;
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      transition: transform 0.1s, box-shadow 0.1s;
      user-select: none;
      -webkit-user-select: none;
    }
    .control-btn:active {
      transform: scale(0.9);
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    #leftBtn {
      background: linear-gradient(135deg, #3b82f6, #1d4ed8);
    }
    #rightBtn {
      background: linear-gradient(135deg, #3b82f6, #1d4ed8);
    }
    #jumpBtn {
      width: 90px;
      height: 90px;
      background: linear-gradient(135deg, #10b981, #059669);
      font-size: 20px;
    }
    #score {
      position: absolute;
      top: 15px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 36px;
      color: #fff;
      text-shadow: 0 2px 10px rgba(0,0,0,0.5), 0 0 20px rgba(59,130,246,0.5);
      z-index: 10;
      pointer-events: none;
    }
    #gameOver {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.85);
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 20;
    }
    #gameOver h1 {
      font-size: 48px;
      color: #ff6b9d;
      margin-bottom: 20px;
      text-shadow: 0 0 20px rgba(255,107,157,0.5);
    }
    #gameOver .final-score {
      font-size: 28px;
      color: #fff;
      margin-bottom: 40px;
    }
    #restartBtn {
      padding: 20px 50px;
      font-size: 24px;
      font-family: 'Fredoka One', cursive;
      background: linear-gradient(135deg, #4ecdc4, #44a08d);
      border: none;
      border-radius: 50px;
      color: #fff;
      cursor: pointer;
      box-shadow: 0 5px 20px rgba(78,205,196,0.4);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    #restartBtn:active {
      transform: scale(0.95);
      box-shadow: 0 2px 10px rgba(78,205,196,0.3);
    }
    #startScreen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.85);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 25;
    }
    #startScreen h1 {
      font-size: 52px;
      color: #4ecdc4;
      margin-bottom: 10px;
      text-shadow: 0 0 30px rgba(78,205,196,0.6);
    }
    #startScreen .subtitle {
      font-size: 18px;
      color: #a0a0a0;
      margin-bottom: 40px;
    }
    #startScreen .instructions {
      color: #fff;
      font-size: 16px;
      text-align: center;
      line-height: 2;
      margin-bottom: 40px;
      padding: 0 20px;
    }
    #startScreen .instructions span {
      color: #ffe66d;
    }
    #startBtn {
      padding: 20px 60px;
      font-size: 26px;
      font-family: 'Fredoka One', cursive;
      background: linear-gradient(135deg, #ff6b9d, #ff8a80);
      border: none;
      border-radius: 50px;
      color: #fff;
      cursor: pointer;
      box-shadow: 0 5px 25px rgba(255,107,157,0.5);
      transition: transform 0.2s;
    }
    #startBtn:active {
      transform: scale(0.95);
    }
  </style>
</head>
<body>
  <div id="score">0</div>
  <canvas id="gameCanvas"></canvas>
  
  <div id="controls">
    <div class="btn-group">
      <button id="leftBtn" class="control-btn">⬅️ Left</button>
      <button id="rightBtn" class="control-btn">Right ➡️</button>
    </div>
    <div class="btn-group">
      <button id="jumpBtn" class="control-btn">⬆️ Jump</button>
    </div>
  </div>
  
  <div id="startScreen">
    <h1>🚀 Jump Quest</h1>
    <div class="subtitle">Endless Platform Climber</div>
    <div class="instructions">
      Use <span>LEFT/RIGHT</span> buttons to move<br>
      Press <span>JUMP</span> to hop up<br>
      Don't fall!
    </div>
    <button id="startBtn">PLAY</button>
  </div>
  
  <div id="gameOver">
    <h1>Game Over!</h1>
    <div class="final-score">Score: <span id="finalScore">0</span></div>
    <button id="restartBtn">Play Again</button>
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const gameOverEl = document.getElementById('gameOver');
    const finalScoreEl = document.getElementById('finalScore');
    const restartBtn = document.getElementById('restartBtn');
    const startScreen = document.getElementById('startScreen');
    const startBtn = document.getElementById('startBtn');
    const leftBtn = document.getElementById('leftBtn');
    const rightBtn = document.getElementById('rightBtn');
    const jumpBtn = document.getElementById('jumpBtn');

    let W, H;
    let gameRunning = false;
    let score = 0;
    let stars = [];
    let platforms = [];
    let player = null;
    let cameraY = 0;
    let basePlatformSpeed = 0.5; // Starting slow
    let maxPlatformSpeed = 2.0;   // Cap speed so jumps stay possible
    
    // Button states
    let moveLeft = false;
    let moveRight = false;

    const platformColors = ['#ff6b9d', '#4ecdc4', '#ffe66d', '#a855f7', '#f97316', '#06b6d4'];

    function resize() {
      const controlsHeight = 100;
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight - controlsHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    function initStars() {
      stars = [];
      for (let i = 0; i < 100; i++) {
        stars.push({
          x: Math.random() * W,
          y: Math.random() * H * 3,
          size: Math.random() * 2 + 0.5,
          twinkle: Math.random() * Math.PI * 2,
          speed: Math.random() * 0.02 + 0.01
        });
      }
    }

    class Player {
      constructor() {
        this.x = W / 2;
        this.y = H - 200; // Start higher!
        this.radius = 22;
        this.vx = 0;
        this.vy = 0;
        this.onGround = false;
        this.squash = 1;
        this.stretch = 1;
        this.eyeOffset = 0;
        this.moveSpeed = 5;
      }

      update() {
        // Handle left/right movement
        if (moveLeft) {
          this.vx -= 0.8;
        }
        if (moveRight) {
          this.vx += 0.8;
        }
        
        // Cap horizontal speed
        this.vx = Math.max(-this.moveSpeed, Math.min(this.moveSpeed, this.vx));
        
        // Gravity
        this.vy += 0.45;
        
        // Apply velocity
        this.x += this.vx;
        this.y += this.vy;
        
        // Friction
        this.vx *= 0.88;
        
        // Wall bounce
        if (this.x < this.radius) {
          this.x = this.radius;
          this.vx *= -0.3;
        }
        if (this.x > W - this.radius) {
          this.x = W - this.radius;
          this.vx *= -0.3;
        }
        
        // Squash/stretch recovery
        this.squash += (1 - this.squash) * 0.15;
        this.stretch += (1 - this.stretch) * 0.15;
        
        // Eye follow velocity
        this.eyeOffset = this.vx * 0.4;
      }

      draw() {
        ctx.save();
        ctx.translate(this.x, this.y - cameraY);
        ctx.scale(this.squash, this.stretch);
        
        // Body glow
        ctx.shadowColor = '#3b82f6';
        ctx.shadowBlur = 15;
        
        // Body (circle)
        const gradient = ctx.createRadialGradient(0, -5, 0, 0, 0, this.radius);
        gradient.addColorStop(0, '#60a5fa');
        gradient.addColorStop(1, '#3b82f6');
        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
        ctx.fill();
        
        ctx.shadowBlur = 0;
        
        // Body outline
        ctx.strokeStyle = '#1d4ed8';
        ctx.lineWidth = 2.5;
        ctx.stroke();
        
        // Antenna
        ctx.strokeStyle = '#9ca3af';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(0, -this.radius);
        ctx.lineTo(0, -this.radius - 12);
        ctx.stroke();
        
        // Antenna ball
        ctx.fillStyle = '#f97316';
        ctx.beginPath();
        ctx.arc(0, -this.radius - 14, 5, 0, Math.PI * 2);
        ctx.fill();
        
        // Eyes
        const eyeY = -4;
        const eyeSpacing = 8;
        
        // Left eye white
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.ellipse(-eyeSpacing + this.eyeOffset, eyeY, 7, 8, 0, 0, Math.PI * 2);
        ctx.fill();
        
        // Right eye white
        ctx.beginPath();
        ctx.ellipse(eyeSpacing + this.eyeOffset, eyeY, 7, 8, 0, 0, Math.PI * 2);
        ctx.fill();
        
        // Left pupil
        ctx.fillStyle = '#1e293b';
        ctx.beginPath();
        ctx.arc(-eyeSpacing + this.eyeOffset * 1.5, eyeY + 1, 3.5, 0, Math.PI * 2);
        ctx.fill();
        
        // Right pupil
        ctx.beginPath();
        ctx.arc(eyeSpacing + this.eyeOffset * 1.5, eyeY + 1, 3.5, 0, Math.PI * 2);
        ctx.fill();
        
        // Eye shine
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(-eyeSpacing + this.eyeOffset * 1.5 - 1.5, eyeY - 1.5, 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(eyeSpacing + this.eyeOffset * 1.5 - 1.5, eyeY - 1.5, 2, 0, Math.PI * 2);
        ctx.fill();
        
        // Mouth
        ctx.strokeStyle = '#1d4ed8';
        ctx.lineWidth = 2.5;
        ctx.beginPath();
        if (this.onGround) {
          ctx.arc(0, 7, 6, 0, Math.PI);
        } else {
          ctx.arc(0, 9, 4, 0, Math.PI);
        }
        ctx.stroke();
        
        // Feet
        ctx.fillStyle = '#3b82f6';
        ctx.beginPath();
        ctx.ellipse(-9, this.radius - 4, 7, 5, -0.3, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(9, this.radius - 4, 7, 5, 0.3, 0, Math.PI * 2);
        ctx.fill();
        
        ctx.restore();
      }
    }

    class Platform {
      constructor(x, y, width) {
        this.x = x;
        this.y = y;
        this.width = width;
        this.height = 16;
        this.color = platformColors[Math.floor(Math.random() * platformColors.length)];
        this.bobOffset = Math.random() * Math.PI * 2;
        this.landed = false;
      }

      update(speed) {
        this.y += speed;
      }

      draw() {
        const bobY = Math.sin(Date.now() * 0.003 + this.bobOffset) * 2;
        const drawY = this.y + bobY - cameraY;
        
        // Skip if off screen
        if (drawY > H + 50 || drawY < -50) return;
        
        ctx.save();
        ctx.translate(this.x, drawY);
        
        // Platform shadow
        ctx.fillStyle = 'rgba(0,0,0,0.25)';
        ctx.beginPath();
        ctx.roundRect(-this.width/2 + 4, 4, this.width, this.height, 8);
        ctx.fill();
        
        // Platform gradient
        const gradient = ctx.createLinearGradient(0, 0, 0, this.height);
        gradient.addColorStop(0, this.color);
        gradient.addColorStop(1, this.adjustColor(this.color, -40));
        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.roundRect(-this.width/2, 0, this.width, this.height, 8);
        ctx.fill();
        
        // Highlight
        ctx.fillStyle = 'rgba(255,255,255,0.35)';
        ctx.beginPath();
        ctx.roundRect(-this.width/2 + 5, 3, this.width - 10, 5, 4);
        ctx.fill();
        
        ctx.restore();
      }

      adjustColor(hex, amount) {
        const num = parseInt(hex.slice(1), 16);
        const r = Math.min(255, Math.max(0, (num >> 16) + amount));
        const g = Math.min(255, Math.max(0, ((num >> 8) & 0x00FF) + amount));
        const b = Math.min(255, Math.max(0, (num & 0x0000FF) + amount));
        return `#${(1 << 24 | r << 16 | g << 8 | b).toString(16).slice(1)}`;
      }
    }

    function initPlatforms() {
      platforms = [];
      
      // Starting platform - larger and right below player
      platforms.push(new Platform(W/2, H - 120, 140));
      
      // Generate initial platforms going up
      let lastY = H - 120;
      for (let i = 0; i < 12; i++) {
        lastY -= 75 + Math.random() * 35; // Closer platforms = always reachable
        const width = 90 + Math.random() * 50;
        const x = width/2 + Math.random() * (W - width);
        platforms.push(new Platform(x, lastY, width));
      }
    }

    function resetGame() {
      score = 0;
      scoreEl.textContent = '0';
      cameraY = 0;
      player = new Player();
      initPlatforms();
      initStars();
      gameOverEl.style.display = 'none';
      gameRunning = true;
    }

    function gameOver() {
      gameRunning = false;
      finalScoreEl.textContent = score;
      gameOverEl.style.display = 'flex';
    }

    function drawStars() {
      stars.forEach(star => {
        const drawY = (star.y - cameraY * 0.3) % (H * 2);
        star.twinkle += star.speed;
        const alpha = 0.3 + Math.sin(star.twinkle) * 0.4;
        ctx.fillStyle = `rgba(255,255,255,${alpha})`;
        ctx.beginPath();
        ctx.arc(star.x, drawY, star.size, 0, Math.PI * 2);
        ctx.fill();
      });
    }

    function checkCollisions() {
      player.onGround = false;
      
      for (let platform of platforms) {
        if (player.vy > 0) {
          const playerBottom = player.y + player.radius;
          const playerTop = player.y - player.radius;
          const prevBottom = playerBottom - player.vy;
          
          if (prevBottom <= platform.y && playerBottom >= platform.y) {
            const platformLeft = platform.x - platform.width/2;
            const platformRight = platform.x + platform.width/2;
            
            if (player.x + player.radius * 0.4 > platformLeft && 
                player.x - player.radius * 0.4 < platformRight) {
              player.y = platform.y - player.radius;
              player.vy = 0;
              player.vx *= 0.6;
              player.squash = 0.75;
              player.stretch = 1.25;
              player.onGround = true;
              
              if (!platform.landed) {
                platform.landed = true;
                score++;
                scoreEl.textContent = score;
                scoreEl.style.transform = 'translateX(-50%) scale(1.4)';
                setTimeout(() => {
                  scoreEl.style.transform = 'translateX(-50%) scale(1)';
                }, 100);
              }
            }
          }
        }
      }
    }

    function updateCamera() {
      const targetY = player.y - H * 0.6;
      if (targetY < cameraY) {
        cameraY += (targetY - cameraY) * 0.08;
      }
    }

    function update() {
      if (!gameRunning) return;
      
      // Speed increases with score - but slower progression
      const speed = Math.min(maxPlatformSpeed, basePlatformSpeed + score * 0.04);
      
      player.update();
      
      platforms.forEach(p => p.update(speed));
      
      // Recycle platforms that fell below
      platforms = platforms.filter(p => p.y - cameraY < H + 100);
      
      // Add new platforms above - closer together so always possible to reach
      const highestPlatform = platforms.reduce((min, p) => p.y < min ? p.y : min, player.y);
      if (highestPlatform > cameraY - 100) {
        const width = 90 + Math.random() * 50;
        const x = width/2 + Math.random() * (W - width);
        platforms.push(new Platform(x, highestPlatform - 75 - Math.random() * 35, width));
      }
      
      checkCollisions();
      updateCamera();
      
      // Check game over
      if (player.y - cameraY > H + 100) {
        gameOver();
      }
    }

    function draw() {
      const gradient = ctx.createLinearGradient(0, 0, 0, H);
      gradient.addColorStop(0, '#0a0a1a');
      gradient.addColorStop(1, '#1a1a3a');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, W, H);
      
      drawStars();
      
      platforms.forEach(p => p.draw());
      
      if (player) {
        player.draw();
      }
    }

    function gameLoop() {
      update();
      draw();
      requestAnimationFrame(gameLoop);
    }

    // Button handlers with touch support
    function addButtonListeners(btn, action) {
      const start = (e) => {
        e.preventDefault();
        action(true);
      };
      const end = (e) => {
        e.preventDefault();
        action(false);
      };
      
      btn.addEventListener('mousedown', start);
      btn.addEventListener('mouseup', end);
      btn.addEventListener('mouseleave', end);
      btn.addEventListener('touchstart', start, { passive: false });
      btn.addEventListener('touchend', end, { passive: false });
    }

    // More reliable button handlers - use pointer events
    const setupButton = (btn, onDown, onUp) => {
      btn.addEventListener('pointerdown', (e) => {
        e.preventDefault();
        btn.setPointerCapture(e.pointerId);
        onDown();
      });
      btn.addEventListener('pointerup', (e) => {
        e.preventDefault();
        onUp();
      });
      btn.addEventListener('pointercancel', (e) => {
        e.preventDefault();
        onUp();
      });
      // Also handle touch directly for better mobile response
      btn.addEventListener('touchstart', (e) => {
        e.preventDefault();
        onDown();
      }, { passive: false });
      btn.addEventListener('touchend', (e) => {
        e.preventDefault();
        onUp();
      }, { passive: false });
    };
    
    setupButton(leftBtn, () => { moveLeft = true; }, () => { moveLeft = false; });
    setupButton(rightBtn, () => { moveRight = true; }, () => { moveRight = false; });
    
    // Jump - trigger immediately on any tap/click
    const doJump = () => {
      if (!gameRunning || !player) return;
      // Allow jump if on ground OR if just fell (small tolerance)
      if (player.onGround || player.vy >= -1) {
        player.vy = -13;
        player.squash = 1.4;
        player.stretch = 0.6;
        player.onGround = false;
      }
    };
    
    jumpBtn.addEventListener('pointerdown', (e) => {
      e.preventDefault();
      doJump();
    });
    jumpBtn.addEventListener('touchstart', (e) => {
      e.preventDefault();
      doJump();
    }, { passive: false });

    startBtn.addEventListener('click', () => {
      startScreen.style.display = 'none';
      resetGame();
    });

    restartBtn.addEventListener('click', () => {
      resetGame();
    });

    gameOverEl.addEventListener('click', (e) => {
      if (e.target === gameOverEl) {
        resetGame();
      }
    });

    document.addEventListener('dblclick', (e) => {
      e.preventDefault();
    });

    // Keyboard support for testing
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft' || e.key === 'a') moveLeft = true;
      if (e.key === 'ArrowRight' || e.key === 'd') moveRight = true;
      if (e.key === ' ' || e.key === 'ArrowUp' || e.key === 'w') {
        e.preventDefault();
        doJump();
      }
    });
    document.addEventListener('keyup', (e) => {
      if (e.key === 'ArrowLeft' || e.key === 'a') moveLeft = false;
      if (e.key === 'ArrowRight' || e.key === 'd') moveRight = false;
    });

    // Initialize
    initStars();
    player = new Player();
    initPlatforms();
    gameLoop();
  </script>
</body>
</html>
